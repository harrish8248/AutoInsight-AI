version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: autoinsight
      POSTGRES_PASSWORD: autoinsight
      POSTGRES_DB: autoinsight
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://autoinsight:autoinsight@db:5432/autoinsight
      JWT_SECRET: dev-change-me
      OPENAI_API_KEY: ""
      OPENAI_MODEL: gpt-4o-mini
      CORS_ORIGINS: "http://localhost:5173"
      MAX_UPLOAD_BYTES: "10485760"
    ports:
      - "8001:8000"
    volumes:
      - backend_data:/app/backend/data

volumes:
  pgdata:
  backend_data:

